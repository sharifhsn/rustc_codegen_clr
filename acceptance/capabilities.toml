schema = 1

[support]
rust_toolchain = "nightly-2026-06-17"
target = "x86_64-unknown-dotnet"
dotnet_cli_profiles = ["10"]
default_dotnet = "10"
presubmit_dotnet = ["10"]
release_dotnet = ["10"]
profiles = ["debug", "release"]
host_os = ["linux", "macos", "windows"]
known_limits = [
  "managed identity requires package metadata and custom assembly-name values are limited to the Cargo package name",
  "Result<managed handle, E> is rejected because the Rust enum would overlap GC-reference storage",
  "generated NuGet bindings preserve rank-1 SZ arrays and closed Task<T>, ValueTask<T>, and IAsyncEnumerable<T> returns with expressible element/result types; arbitrary constructed generics, multidimensional or non-SZ arrays, and unsupported value-type structs remain omitted",
  "Windows x64 is supported by the 0.0.1 compiler SDK; MSBuild and NativeAOT coverage is narrower than Linux",
  "MSBuild derives Cargo-local inputs automatically; non-Cargo external inputs require RustDotnetInput declarations",
]

[[blocker]]
id = "managed-identity-collision"
fixture = "cargo_tests/cd_multi_library_collision"
oracle = "feasibility/managed_identity_acceptance.sh"
current_expected = "CS0433 MainModule exists in both assemblies"
closes_when = "two libraries compile and execute through distinct managed namespace/type identities"
status = "closed-focused"

[[blocker]]
id = "typed-dto-export"
fixture = "cargo_tests/cd_typed_dto"
oracle = "cargo dotnet build cargo_tests/cd_typed_dto/rustlib && dotnet run --project cargo_tests/cd_typed_dto/csharp/cd_typed_dto_cs.csproj -c Release"
current_expected = "real CLR properties roundtrip Decimal, nullable DateOnly, and String values"
closes_when = "fixture compiles and executes as a typed C# consumer"
status = "closed-focused"

[[blocker]]
id = "rid-complete-nuget-assets"
fixture = "tools/cargo-dotnet/src/fixtures/nuget-assets"
oracle = "nuget_assets::tests::rid_asset_graph_snapshots_are_preserved"
current_expected = "ignored red test; current parser drops runtimeTargets/native/resources/RID/owner"
closes_when = "test is unignored and all RID snapshots pass"
status = "closed-focused"

[[blocker]]
id = "transitive-msbuild-inputs"
fixture = "feasibility/fixtures/msbuild_transitive_inputs"
oracle = "feasibility/transitive_input_invalidation_acceptance.sh"
current_expected = "path dependency mutation is skipped by MSBuild"
closes_when = "path dependency and build input mutations rebuild, followed by a no-op"
status = "closed-focused"

