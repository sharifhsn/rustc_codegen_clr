# dotnet_overlays registry — the single source of crate overlays for the .NET target.
#
# Each [[overlay]] declares a crate that needs a small, marked source overlay to
# compile/run on the x86_64-unknown-dotnet target, plus the EXACT upstream version
# the overlay was prepared against. The auto-apply step (feasibility/dev.sh
# `apply_overlays`, the future `cargo dotnet`) reads this file, finds which of a
# project's *locked* deps have an overlay here, and redirects them via a generated
# `.cargo/config.toml` `paths = [...]` override — the user edits NOTHING in their
# own Cargo.toml.
#
# version = the version pinned in the consuming project's Cargo.lock. A `paths`
# override only takes effect when the local crate's version SATISFIES the locked
# requirement; on a name match with a version MISMATCH cargo warns and ignores the
# override (it does not error and does not silently substitute the wrong version).
# The auto-apply step ALSO warns loudly on such a mismatch, because a silently-
# unused overlay is the "patch not applied -> miscompile" footgun. Bump `version`
# here whenever you refresh an overlay against a newer upstream (see README.md).
#
# dir = the overlay's directory under dotnet_overlays/ (a full crate dir: byte-
# identical upstream + a handful of `// DOTNET PAL`-marked lines; see README.md).
#
# MULTI-VERSION (same NAME, different versions): several [[overlay]] blocks may share
# a `name` so long as they declare distinct `version`s + `dir`s — getrandom does this
# for its three coexisting majors (0.2/0.3/0.4 can ALL be live in one dep graph). The
# auto-apply step emits one `paths` dir per [[overlay]]; cargo's `paths` override is
# keyed by crate NAME and picks, among the candidate dirs, the one whose own
# Cargo.toml version SATISFIES each locked instance — so the three same-name dirs
# coexist and resolve 0.2.17->getrandom-0.2, 0.3.4->getrandom-0.3, 0.4.3->getrandom-0.4.
# The lock-mismatch verifier matches on (name, version), not name alone, so each
# major reports APPLIED/MISMATCH independently.

[[overlay]]
name = "mio"
version = "1.2.1"
dir = "mio"

[[overlay]]
name = "socket2"
version = "0.6.4"
dir = "socket2"

[[overlay]]
name = "tokio"
version = "1.52.3"
dir = "tokio"

# parking_lot_core — ONE marked arm (a `target_os="dotnet"` branch in
# thread_parker/mod.rs) routing the parker off the raw-pthread `unix.rs` (which has
# no .NET libc) onto upstream's own portable `generic.rs` spin parker. Unblocks
# every parking_lot / lock_api consumer (dashmap, ...) with NO pthread shim.
[[overlay]]
name = "parking_lot_core"
version = "0.9.12"
dir = "parking_lot_core"

# getrandom — three coexisting majors. Each overlay IS getrandom (patched) with a
# self-contained `target_os="dotnet"` backend arm that calls the PAL CSPRNG
# (rcl_dotnet_random_fill), so rand/ahash/uuid (and any getrandom user) build with
# ZERO consumer wiring — no custom symbol, no `getrandom_backend=custom` cfg, no
# `getrandom_dotnet` dep. See README.md "The overlays, line by line".
[[overlay]]
name = "getrandom"
version = "0.4.3"
dir = "getrandom-0.4"

[[overlay]]
name = "getrandom"
version = "0.3.4"
dir = "getrandom-0.3"

[[overlay]]
name = "getrandom"
version = "0.2.17"
dir = "getrandom-0.2"
