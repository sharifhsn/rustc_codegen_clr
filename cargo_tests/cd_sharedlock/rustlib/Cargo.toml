[package]
name = "cd_sharedlock"
version = "0.1.0"
edition = "2021"

[lib]
# A .NET class library: `cargo dotnet build` emits `cd_sharedlock.dll` whose `MainModule` carries the
# exported seam shims (raw `#[no_mangle] extern "C"` functions handing a real managed `SemaphoreSlim`
# handle to C#, plus `#[dotnet_export]`-generated primitive helpers), callable from C# as plain typed
# methods.
crate-type = ["cdylib"]

[dependencies]
mycorrhiza = { path = "../../../mycorrhiza" }
dotnet_macros = { path = "../../../dotnet_macros" }

# Under the repo workspace root -> needs a bare `[workspace]` (the cd_pure footgun).
[workspace]

[profile.release.build-override]
codegen-units = 1
