[package]
name = "cd_mvc"
version = "0.1.0"
edition = "2024"

[lib]
# A .NET class library: `cargo dotnet build` emits `cd_mvc.dll` whose `MainModule` carries the
# `#[dotnet_export]`-generated seam shims and the `#[dotnet_class]`-generated `Calculator` type,
# callable from a real ASP.NET Core minimal-API host (see ../csharp).
crate-type = ["cdylib"]

[dependencies]
mycorrhiza = { path = "../../../mycorrhiza" }
dotnet_macros = { path = "../../../dotnet_macros" }

# Under the repo workspace root -> needs a bare `[workspace]` (the cd_pure footgun).
[workspace]

[profile.release.build-override]
codegen-units = 1
