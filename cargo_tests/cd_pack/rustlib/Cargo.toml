[package]
name = "cd_pack"
version = "0.3.1"
edition = "2021"
description = "Probe crate for the cargo-dotnet-produced NuGet package's metadata (README, license, repository, version, TFM)."
license = "MIT"
repository = "https://github.com/sharifhsn/rustc_codegen_clr"
authors = ["Sharif Haason <sharif.haason@gmail.com>"]
readme = "README.md"

[lib]
# A .NET class library: exercises `cargo dotnet pack`'s NuGet metadata plumbing, not the
# codegen surface. A single trivial export is enough.
crate-type = ["cdylib"]

[dependencies]
mycorrhiza = { path = "../../../mycorrhiza" }

# Under the repo workspace root -> needs a bare `[workspace]` (the cd_pure footgun).
[workspace]

[profile.release.build-override]
codegen-units = 1
