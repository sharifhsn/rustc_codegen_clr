[package]
name = "cd_static_iface"
version = "0.1.0"
edition = "2021"

[lib]
# A .NET class library: `cargo dotnet build` emits `cd_static_iface.dll` containing a genuine
# ECMA-335 interface with STATIC ABSTRACT members (.NET 7+ static virtual members in interfaces)
# synthesized from a Rust trait via `#[dotnet_interface]`. Under the default DIRECT_PE=1 path the
# hand-rolled PE writer emits the members with Roslyn's exact 0x4D6 flags directly (no ilasm).
crate-type = ["cdylib"]

[dependencies]
mycorrhiza = { path = "../../../mycorrhiza" }
dotnet_macros = { path = "../../../dotnet_macros" }

# Under the repo workspace root -> needs a bare `[workspace]` (the cd_pure footgun).
[workspace]

[profile.release.build-override]
codegen-units = 1
