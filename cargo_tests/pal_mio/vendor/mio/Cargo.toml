# Vendored copy of mio 1.2.1 (verbatim source) + a DOTNET PAL ARM.
#
# This is the exact published mio 1.2.1, with a `sys/dotnet` arm added so mio's
# readiness model (Poll/Selector/Interest + Token) runs on the os=dotnet target
# over System.Net.Sockets (Socket.Poll via the `rcl_dotnet_socket_poll` backend
# hook). All dotnet additions are marked `// DOTNET PAL ARM`. The original
# manifest's `examples`, `Cargo.toml.orig`, and dev-dependencies (env_logger,
# rand — used only by mio's own test suite) were dropped; everything else is the
# upstream normalized manifest. Wired in via `[patch.crates-io]` in
# `cargo_tests/pal_mio/Cargo.toml`.

[package]
edition = "2021"
rust-version = "1.71"
name = "mio"
version = "1.2.1"
authors = [
    "Carl Lerche <me@carllerche.com>",
    "Thomas de Zeeuw <thomasdezeeuw@gmail.com>",
    "Tokio Contributors <team@tokio.rs>",
]
build = false
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "Lightweight non-blocking I/O."
homepage = "https://github.com/tokio-rs/mio"
readme = "README.md"
keywords = [
    "io",
    "async",
    "non-blocking",
]
categories = ["asynchronous"]
license = "MIT"
repository = "https://github.com/tokio-rs/mio"

[features]
default = ["log"]
net = []
os-ext = [
    "os-poll",
    "windows-sys/Win32_System_Pipes",
    "windows-sys/Win32_Security",
]
os-poll = []

[lib]
name = "mio"
path = "src/lib.rs"

[dependencies.log]
version = "0.4.8"
optional = true

[target.'cfg(any(unix, target_os = "hermit", target_os = "wasi"))'.dependencies.libc]
version = "0.2.183"

[target.'cfg(target_os = "wasi")'.dependencies.wasi]
version = "0.11.0"

[target."cfg(windows)".dependencies.windows-sys]
version = "0.61"
features = [
    "Wdk_Foundation",
    "Wdk_Storage_FileSystem",
    "Wdk_System_IO",
    "Win32_Foundation",
    "Win32_Networking_WinSock",
    "Win32_Storage_FileSystem",
    "Win32_Security",
    "Win32_System_IO",
    "Win32_System_WindowsProgramming",
]

[lints.rust.unexpected_cfgs]
level = "warn"
priority = 0
check-cfg = [
    "cfg(mio_unsupported_force_poll_poll)",
    "cfg(mio_unsupported_force_waker_pipe)",
]
